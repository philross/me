<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Website Under Construction</title>

    <style>
        body {
          margin: 0;
          background: #111;
          color: #f5f5f5;
          font-family: monospace;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          padding: 20px;
          box-sizing: border-box;
          text-align: center;
        }

        .container {
          max-width: 900px;
          width: 100%;
        }

        h1 {
          font-size: clamp(2rem, 5vw, 4rem);
          margin-bottom: 1rem;
        }

        p {
          color: #bbb;
          margin-bottom: 2rem;
          font-size: clamp(1rem, 2vw, 1.2rem);
        }

        pre {
          font-size: clamp(7px, 1.5vw, 14px);
          line-height: 1.1;
          overflow-x: auto;
          white-space: pre;
          color: #8cff8c;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Website Under Construction</h1>
    <p>Out on a long ride. Check back soon.</p>
</div>
</body>
</html>
